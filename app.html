<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyLegacy – Entdecke dein Vermächtnis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #8a6f2e;
    --bg: #0a0806;
    --bg2: #130f09;
    --bg3: #1c1610;
    --text: #f0e6d0;
    --text-muted: #8a7a60;
    --radius: 12px;
    --rose: #c97a8a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px 80px; position: relative; z-index: 1; }

  /* Lang */
  .lang-switcher { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 32px; }
  .lang-btn { background: transparent; border: 1px solid var(--gold-dark); color: var(--text-muted); padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: 'Cinzel', serif; letter-spacing: 1px; transition: all 0.2s; }
  .lang-btn.active, .lang-btn:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); }

  /* Header */
  header { text-align: center; margin-bottom: 48px; animation: fadeDown 0.8s ease; }
  .logo { font-family: 'Cinzel Decorative', cursive; font-size: clamp(36px,8vw,72px); font-weight: 900; background: linear-gradient(135deg,#8a6f2e 0%,#e8c97a 40%,#c9a84c 60%,#8a6f2e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 2px; line-height: 1.1; margin-bottom: 8px; }
  .tagline { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; }
  .divider { display: flex; align-items: center; gap: 16px; margin: 24px auto; max-width: 300px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; }
  .divider::before { background: linear-gradient(to right, transparent, var(--gold-dark)); }
  .divider::after { background: linear-gradient(to left, transparent, var(--gold-dark)); }
  .divider-icon { color: var(--gold); font-size: 16px; }

  /* Input */
  .input-section { background: var(--bg2); border: 1px solid rgba(201,168,76,0.2); border-radius: var(--radius); padding: 32px; margin-bottom: 32px; animation: fadeUp 0.8s ease 0.1s both; }
  .input-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 12px; display: block; }
  .input-row { display: flex; gap: 12px; }
  .name-input { flex: 1; background: var(--bg3); border: 1px solid rgba(201,168,76,0.3); border-radius: 8px; padding: 14px 20px; color: var(--text); font-family: 'Cinzel', serif; font-size: 16px; outline: none; transition: border-color 0.2s; }
  .name-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,168,76,0.1); }
  .name-input::placeholder { color: var(--text-muted); }
  .generate-btn { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); border: none; border-radius: 8px; padding: 14px 28px; color: var(--bg); font-family: 'Cinzel', serif; font-weight: 600; font-size: 14px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .generate-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(201,168,76,0.3); }

  /* Gender indicator */
  .gender-indicator { display: none; align-items: center; gap: 10px; margin-top: 14px; padding: 10px 16px; border-radius: 8px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; }
  .gender-indicator.male { background: rgba(76,130,201,0.1); border: 1px solid rgba(76,130,201,0.25); color: #7ab0e8; }
  .gender-indicator.female { background: rgba(201,122,138,0.1); border: 1px solid rgba(201,122,138,0.25); color: var(--rose); }
  .gender-indicator.neutral { background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); color: var(--gold); }
  .gender-icon { font-size: 18px; }

  /* Categories */
  .categories-title { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; display: block; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-all-btn { background: var(--gold); color: var(--bg); border: none; border-radius: 6px; padding: 6px 14px; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px; cursor: pointer; }
  .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .cat-btn { background: var(--bg3); border: 1px solid rgba(201,168,76,0.15); border-radius: 8px; padding: 10px 8px; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.2s; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .cat-btn:hover { border-color: var(--gold-dark); color: var(--text); background: rgba(201,168,76,0.05); }
  .cat-btn.active { background: rgba(201,168,76,0.12); border-color: var(--gold); color: var(--gold-light); }
  .cat-btn .cat-emoji { font-size: 20px; }
  .cat-btn .cat-name { font-size: 10px; letter-spacing: 0.5px; font-family: 'Cinzel', serif; }

  /* Results */
  .results-title { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; text-align: center; }
  .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
  .result-card { background: var(--bg2); border: 1px solid rgba(201,168,76,0.15); border-radius: var(--radius); padding: 20px; transition: all 0.3s; cursor: pointer; animation: cardAppear 0.4s ease both; position: relative; overflow: hidden; }
  .result-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(to right, transparent, var(--gold), transparent); opacity: 0; transition: opacity 0.3s; }
  .result-card.female-card::before { background: linear-gradient(to right, transparent, var(--rose), transparent); }
  .result-card:hover { border-color: rgba(201,168,76,0.4); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .result-card:hover::before { opacity: 1; }
  .result-cat { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .result-emoji { font-size: 22px; }
  .result-cat-name { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; }
  .result-name { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 600; color: var(--gold-light); line-height: 1.3; margin-bottom: 8px; }
  .result-card.female-card .result-name { color: #e8a0b0; }
  .result-meaning { font-size: 11px; color: var(--text-muted); font-style: italic; line-height: 1.5; }
  .gender-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; margin-top: 8px; padding: 3px 8px; border-radius: 10px; font-family: 'Cinzel', serif; letter-spacing: 1px; }
  .gender-badge.m { background: rgba(76,130,201,0.15); color: #7ab0e8; }
  .gender-badge.f { background: rgba(201,122,138,0.15); color: var(--rose); }
  .copy-hint { font-size: 10px; color: var(--gold-dark); margin-top: 10px; font-family: 'Cinzel', serif; letter-spacing: 1px; opacity: 0; transition: opacity 0.2s; }
  .result-card:hover .copy-hint { opacity: 1; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 2px; color: var(--text-muted); }

  .copied-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--gold); color: var(--bg); padding: 10px 24px; border-radius: 30px; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 1px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100; }
  .copied-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes cardAppear { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }

  @media (max-width: 600px) {
    .input-row { flex-direction: column; }
    .results-grid { grid-template-columns: 1fr; }
    .categories-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('de')">DE</button>
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>

  <header>
    <div class="logo">MyLegacy</div>
    <div class="tagline" id="tagline">Entdecke dein Vermächtnis</div>
    <div class="divider"><span class="divider-icon">✦</span></div>
  </header>

  <div class="input-section">
    <label class="input-label" id="input-label">Dein Name</label>
    <div class="input-row">
      <input type="text" class="name-input" id="nameInput" placeholder="z.B. Fabian oder Andrea" oninput="detectGender(this.value)" />
      <button class="generate-btn" onclick="generate()" id="gen-btn">Entdecken ✦</button>
    </div>
    <div class="gender-indicator" id="genderIndicator">
      <span class="gender-icon" id="genderIcon"></span>
      <span id="genderText"></span>
    </div>
  </div>

  <div class="input-section">
    <label class="categories-title" id="cat-label">Universen wählen</label>
    <div class="filter-bar">
      <button class="filter-all-btn" onclick="selectAll()" id="sel-all-btn">Alle wählen</button>
      <button class="filter-all-btn" style="background:var(--bg3);color:var(--text-muted);border:1px solid rgba(201,168,76,0.2)" onclick="selectNone()" id="sel-none-btn">Keine</button>
    </div>
    <div class="categories-grid" id="catGrid"></div>
  </div>

  <div id="resultsSection" style="display:none">
    <div class="results-title" id="results-label">Deine Legenden-Namen</div>
    <div class="results-grid" id="resultsGrid"></div>
  </div>

  <div id="emptyState" class="empty-state" style="display:none">
    <div class="empty-icon">⚔️</div>
    <div class="empty-text" id="empty-text">Wähle mindestens ein Universum</div>
  </div>
</div>

<div class="copied-toast" id="toast"></div>

let lang = 'de';

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  const t = i18n[l];
  document.getElementById('tagline').textContent = t.tagline;
  document.getElementById('input-label').textContent = t.inputLabel;
  document.getElementById('gen-btn').textContent = t.genBtn;
  document.getElementById('cat-label').textContent = t.catLabel;
  document.getElementById('sel-all-btn').textContent = t.selAll;
  document.getElementById('sel-none-btn').textContent = t.selNone;
  document.getElementById('results-label').textContent = t.resultsLabel;
  document.getElementById('empty-text').textContent = t.emptyText;
  document.getElementById('nameInput').placeholder = t.placeholder;
  document.querySelectorAll('.copy-hint').forEach(el => el.textContent = t.copyHint);
  detectGender(document.getElementById('nameInput').value);
  buildCatGrid();
}

let currentGender = 'neutral'; // 'male' | 'female' | 'neutral'

function detectGender(name) {
  const n = name.trim().toLowerCase();
  const indicator = document.getElementById('genderIndicator');
  const icon = document.getElementById('genderIcon');
  const text = document.getElementById('genderText');
  const t = i18n[lang];

  if (!n) { indicator.style.display = 'none'; currentGender = 'neutral'; return; }

  // Check exact match first
  let gender = 'neutral';
  if (femaleNames.has(n)) gender = 'female';
  else if (maleNames.has(n)) gender = 'male';
  else {
    // Heuristic endings
    const femEndings = ['a','ine','ina','elle','ette','ette','leen','leen','lyn','nie','sie'];
    const malEndings = ['us','os','er','an','en','on','jan','ian','el','al','ael','uel'];
    if (femEndings.some(e => n.endsWith(e) && n.length > 3)) gender = 'female';
    else if (malEndings.some(e => n.endsWith(e) && n.length > 3)) gender = 'male';
  }

  currentGender = gender;
  indicator.style.display = 'flex';
  indicator.className = 'gender-indicator ' + gender;

  if (gender === 'female') {
    icon.textContent = '♀';
    text.textContent = t.genderFemale;
  } else if (gender === 'male') {
    icon.textContent = '♂';
    text.textContent = t.genderMale;
  } else {
    icon.textContent = '✦';
    text.textContent = t.genderNeutral;
  }
}

// ── Hash ──────────────────────────────────────────────────────────────────────
function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
  return Math.abs(h);
}
function pick(arr, seed) { return arr[seed % arr.length]; }

function generateName(realName, catId) {
  const n = realName.trim().toLowerCase();
  const data = nameData[catId];
  if (!data) return null;

  const genderKey = currentGender === 'female' ? 'female' : 'male';
  const d = data[genderKey] || data.male;

  const s1 = hashStr(n + catId + 'first');
  const s2 = hashStr(n + catId + 'last');
  const s3 = hashStr(n + catId + 'suffix');

  let fullName;
  if (catId === 'roman' && d.suffix) {
    fullName = pick(d.first, s1) + ' ' + pick(d.last, s2) + ' ' + pick(d.suffix, s3);
  } else if (catId === 'superhero') {
    fullName = pick(d.first, s1) + pick(d.last, s2);
  } else {
    fullName = pick(d.first, s1) + ' ' + pick(d.last, s2);
  }

  const meaning = data.meaning[lang] || data.meaning.en;
  const cat = categories.find(c => c.id === catId);
  const catName = cat ? (cat[lang] || cat.en) : catId;
  const t = i18n[lang];
  const genderLabel = currentGender === 'female' ? t.badgeF : t.badgeM;
  return { name: fullName, meaning: catName + ' ' + meaning, genderLabel, isFemale: currentGender === 'female' };
}

// ── State & grid ──────────────────────────────────────────────────────────────
let selected = new Set(categories.map(c => c.id));

function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (selected.has(cat.id) ? ' active' : '');
    btn.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><span class="cat-name">${cat[lang] || cat.en}</span>`;
    btn.onclick = () => { selected.has(cat.id) ? selected.delete(cat.id) : selected.add(cat.id); btn.classList.toggle('active'); };
    grid.appendChild(btn);
  });
}

function selectAll() { selected = new Set(categories.map(c => c.id)); buildCatGrid(); }
function selectNone() { selected.clear(); buildCatGrid(); }

// ── Generate ──────────────────────────────────────────────────────────────────
function generate() {
  const rawName = document.getElementById('nameInput').value.trim();
  if (!rawName) { alert(i18n[lang].noName); return; }

  detectGender(rawName);

  const activeCats = categories.filter(c => selected.has(c.id));
  const section = document.getElementById('resultsSection');
  const empty = document.getElementById('emptyState');
  const grid = document.getElementById('resultsGrid');

  if (activeCats.length === 0) { section.style.display='none'; empty.style.display='block'; return; }

  section.style.display = 'block';
  empty.style.display = 'none';
  grid.innerHTML = '';

  activeCats.forEach((cat, i) => {
    const result = generateName(rawName, cat.id);
    if (!result) return;
    const card = document.createElement('div');
    card.className = 'result-card' + (result.isFemale ? ' female-card' : '');
    card.style.animationDelay = (i * 0.04) + 's';
    card.innerHTML = `
      <div class="result-cat">
        <span class="result-emoji">${cat.emoji}</span>
        <span class="result-cat-name">${cat[lang] || cat.en}</span>
      </div>
      <div class="result-name">${result.name}</div>
      <div class="result-meaning">${result.meaning}</div>
      <div class="gender-badge ${result.isFemale ? 'f' : 'm'}">${result.genderLabel}</div>
      <div class="copy-hint">${i18n[lang].copyHint}</div>
    `;
    card.onclick = () => copyName(result.name);
    grid.appendChild(card);
  });

  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyName(name) {
  navigator.clipboard.writeText(name).catch(() => {});
  const toast = document.getElementById('toast');
  toast.textContent = i18n[lang].copied + ' ' + name;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
buildCatGrid();
</script>
</body>
